rules:
  - id: dvwa-sqli-direct-interpolation
    patterns:
      - pattern: |
          $QUERY = "... $REQUEST['$VAR'] ...";
      - pattern-not: |
          mysqli_real_escape_string(..., $_REQUEST['$VAR'])
    message: |
      SQL Injection: User input from $_REQUEST['$VAR'] is directly interpolated
      into a SQL query string without sanitisation. 
      Fix: Use prepared statements with mysqli_prepare() and bind_param().
      DVWA Reference: vulnerabilities/sqli - Low security level
    languages: [php]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021

  - id: dvwa-sqli-get-post-interpolation
    pattern: |
      $Q = "... $_GET[$K] ...";
    message: |
      SQL Injection: $_GET input flows directly into SQL query.
      Use prepared statements instead.
    languages: [php]
    severity: ERROR
    metadata:
      cwe: CWE-89

  - id: dvwa-xss-direct-echo
    patterns:
      - pattern: echo '...' . $_GET[$K] . '...';
      - pattern-not: echo '...' . htmlspecialchars($_GET[$K]) . '...';
    message: |
      Reflected XSS: $_GET[$K] is echoed directly into HTML without encoding.
      Fix: Use htmlspecialchars($input, ENT_QUOTES, 'UTF-8') before output.
      DVWA Reference: vulnerabilities/xss_r - Low security level
    languages: [php]
    severity: ERROR
    metadata:
      cwe: CWE-79
      owasp: A03:2021

  - id: dvwa-command-injection-shell-exec
    patterns:
      - pattern: shell_exec('...' . $VAR)
      - pattern-not: shell_exec('...' . escapeshellarg($VAR))
    message: |
      Command Injection: User-controlled variable $VAR is passed to shell_exec
      without sanitisation. Attacker can append: ; cat /etc/passwd
      Fix: Use escapeshellarg() or avoid shell commands entirely.
      DVWA Reference: vulnerabilities/exec - Low security level
    languages: [php]
    severity: ERROR
    metadata:
      cwe: CWE-78
      owasp: A03:2021

  - id: dvwa-hardcoded-password
    pattern: $PASSWORD = '...';
    pattern-not: $PASSWORD = '';
    message: |
      Hardcoded password detected. Store credentials in environment variables
      or a secrets manager (HashiCorp Vault, AWS Secrets Manager).
    languages: [php]
    severity: WARNING
    metadata:
      cwe: CWE-798